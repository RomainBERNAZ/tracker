services:
  # ─── Interactive dev shell ───────────────────────────────────────────────────
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: expresso-review:dev
    working_dir: /app
    stdin_open: true
    tty: true
    # X11 forwarding (optional – needed to run the Tauri GUI)
    environment:
      - DISPLAY=${DISPLAY:-}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/tmp}
    volumes:
      - ..:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
      - expresso-data:/root/.local/share/dev.expresso.review
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    ports:
      - "5173:5173"   # Vite HMR
    command: bash

  # ─── Test runner ─────────────────────────────────────────────────────────────
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: expresso-review:dev
    volumes:
      - ..:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
    working_dir: /app
    command: >
      bash -c "
        echo '=== Rust tests ===' &&
        cargo test --all --release 2>&1 &&
        echo '=== Frontend tests ===' &&
        cd src/frontend && pnpm install --frozen-lockfile && pnpm test --run 2>&1
      "

  # ─── Cargo-only CI (no Node/Tauri) ───────────────────────────────────────────
  test-rust:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: expresso-review:dev
    volumes:
      - ..:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
    working_dir: /app
    command: cargo test --all --release -- --test-threads=4

volumes:
  cargo-cache:
  cargo-git:
  target-cache:
  expresso-data:
